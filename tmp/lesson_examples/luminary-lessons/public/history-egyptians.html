<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="color-scheme" content="dark">
<title>Lyla Rae — Ancient Egyptians with Lumi</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;font-family:'Nunito',sans-serif;background:#100a00 !important;color:#f5ead8 !important;overflow:hidden;}
html{background-color:#100a00 !important;}
.stars{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
.star{position:absolute;border-radius:50%;animation:twinkle var(--d) ease-in-out infinite var(--delay);}
@keyframes twinkle{0%,100%{opacity:0.1}50%{opacity:0.6}}
.app{position:fixed;inset:0;display:flex;flex-direction:column;max-width:480px;margin:0 auto;z-index:1;background:#100a00 !important;}
.hdr{padding:14px 18px 8px;background:#100a00 !important;display:flex;align-items:center;gap:12px;flex-shrink:0;}
.orb{width:38px;height:38px;border-radius:50%;flex-shrink:0;background:linear-gradient(135deg,#fbbf24,#f97316,#ef4444);display:flex;align-items:center;justify-content:center;font-size:18px;box-shadow:0 0 14px rgba(251,191,36,0.5);}
.hi{flex:1;}
.hs{font-size:9px;color:#f59e0b;font-weight:800;text-transform:uppercase;letter-spacing:1.5px;}
.ht{font-size:15px;font-weight:800;color:#fff;}
.xpc{display:flex;align-items:center;gap:4px;background:rgba(251,191,36,0.12);border:1px solid rgba(251,191,36,0.3);padding:6px 12px;border-radius:999px;font-size:13px;font-weight:800;color:#fbbf24;}
.mb{height:3px;background:rgba(245,158,11,0.1);margin:0 18px 5px;border-radius:2px;overflow:hidden;}
.mf{height:100%;background:#f59e0b;border-radius:2px;transition:width 0.8s ease;width:0%;}
.pb{display:flex;align-items:center;padding:0 18px 6px;gap:2px;flex-shrink:0;}
.pi{display:flex;flex-direction:column;align-items:center;gap:2px;}
.pc{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;transition:all 0.4s;background:rgba(245,158,11,0.04);border:2px solid rgba(245,158,11,0.15);}
.pc.done{background:rgba(245,158,11,0.25);border-color:#f59e0b;}
.pc.active{background:#f59e0b;border-color:#f59e0b;box-shadow:0 0 12px rgba(245,158,11,0.5);}
.pl{font-size:7px;color:rgba(245,158,11,0.5);font-weight:700;white-space:nowrap;}
.pl.active{color:#f59e0b;}
.pln{flex:1;height:2px;background:rgba(245,158,11,0.1);margin-bottom:12px;}
.chat{flex:1;overflow-y:auto;padding:4px 14px 10px;display:flex;flex-direction:column;gap:10px;background:#100a00 !important;}
@keyframes mi{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.lm{display:flex;gap:8px;align-items:flex-start;animation:mi 0.3s ease both;}
.la{width:28px;height:28px;border-radius:50%;flex-shrink:0;margin-top:2px;background:linear-gradient(135deg,#fbbf24,#f97316);display:flex;align-items:center;justify-content:center;font-size:14px;}
.lb{background:rgba(245,158,11,0.08);border:1px solid rgba(245,158,11,0.2);border-radius:4px 16px 16px 16px;padding:11px 14px;max-width:calc(100% - 44px);font-size:14px;line-height:1.75;color:#f5ead8;}
.lb strong{color:#fff;} .lb em{color:#fcd34d;font-style:normal;font-weight:800;}
.cm{display:flex;justify-content:flex-end;animation:mi 0.3s ease both;}
.cb{background:#f59e0b;border-radius:16px 4px 16px 16px;padding:11px 15px;max-width:82%;font-size:14px;line-height:1.6;color:#100a00;font-weight:700;}
.bnr{background:rgba(245,158,11,0.08);border:1px solid rgba(245,158,11,0.22);border-radius:12px;padding:9px 13px;font-size:12px;font-weight:800;color:#fcd34d;animation:mi 0.3s ease both;}
.tr{display:flex;gap:8px;align-items:center;}
.tb{background:rgba(245,158,11,0.08);border:1px solid rgba(245,158,11,0.18);border-radius:4px 16px 16px 16px;padding:11px 14px;display:flex;gap:4px;}
.td{width:6px;height:6px;border-radius:50%;background:#f59e0b;opacity:0.5;}
.td:nth-child(1){animation:bounce 1.4s 0ms ease-in-out infinite;}
.td:nth-child(2){animation:bounce 1.4s 200ms ease-in-out infinite;}
.td:nth-child(3){animation:bounce 1.4s 400ms ease-in-out infinite;}
@keyframes bounce{0%,60%,100%{transform:translateY(0);opacity:0.4}30%{transform:translateY(-5px);opacity:1}}
.cc{background:linear-gradient(135deg,rgba(245,158,11,0.12),rgba(245,158,11,0.03));border:1px solid rgba(245,158,11,0.28);border-radius:18px;padding:16px;}
.tof{background:rgba(245,158,11,0.06);border:1px solid rgba(245,158,11,0.2);border-radius:18px;padding:14px;}
.tofq{background:rgba(255,255,255,0.05);border:1px solid rgba(245,158,11,0.18);border-radius:14px;padding:13px 14px;font-size:14px;color:#fff;font-weight:600;line-height:1.55;margin-bottom:12px;min-height:56px;display:flex;align-items:center;justify-content:center;text-align:center;}
.tofbtns{display:flex;gap:10px;}
.tofbtn{flex:1;padding:13px;border-radius:13px;border:2px solid;cursor:pointer;font-family:'Nunito',sans-serif;font-size:14px;font-weight:800;transition:all 0.2s;}
.tofbtn:disabled{opacity:0.4;cursor:not-allowed;}
.trev{margin-top:10px;padding:11px 13px;border-radius:12px;font-size:13px;line-height:1.5;display:none;}
.tnxt{width:100%;margin-top:10px;background:#f59e0b;border:none;border-radius:12px;padding:11px;font-size:13px;font-weight:800;color:#100a00;cursor:pointer;font-family:'Nunito',sans-serif;display:none;}
.xpp{position:fixed;bottom:110px;right:28px;font-size:15px;font-weight:900;color:#fbbf24;pointer-events:none;z-index:999;}
.cov{position:fixed;inset:0;z-index:500;background:radial-gradient(ellipse at 50% 30%,#1f1000,#100a00);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px 24px;text-align:center;overflow-y:auto;}
.ia{padding:6px 14px 18px;background:#100a00 !important;flex-shrink:0;}
.ir{display:flex;gap:10px;align-items:flex-end;margin-bottom:7px;}
.txta{flex:1;background:rgba(245,158,11,0.08);border:1.5px solid rgba(245,158,11,0.25);border-radius:16px;padding:11px 14px;color:#f5ead8;font-family:'Nunito',sans-serif;font-size:14px;resize:none;outline:none;min-height:46px;line-height:1.5;}
.txta:focus{border-color:rgba(245,158,11,0.55);}
.txta::placeholder{color:rgba(245,234,216,0.4);}
.sndb{width:46px;height:46px;border-radius:13px;background:#f59e0b;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:19px;color:#100a00;flex-shrink:0;transition:all 0.2s;}
.sndb:disabled{opacity:0.35;cursor:not-allowed;}
.btmr{display:flex;align-items:center;justify-content:space-between;}
.hntb{background:rgba(245,158,11,0.08);border:1px solid rgba(245,158,11,0.22);border-radius:9px;padding:6px 13px;cursor:pointer;font-size:12px;font-weight:800;color:rgba(255,215,80,0.9);font-family:'Nunito',sans-serif;}
.hntb:disabled{opacity:0.3;cursor:not-allowed;}
.stxt{font-size:11px;color:rgba(245,234,216,0.4);font-weight:600;}
.qrs{display:flex;flex-wrap:wrap;gap:6px;padding-bottom:8px;}
.qrb{background:rgba(245,158,11,0.1);border:1px solid rgba(245,158,11,0.28);border-radius:999px;padding:7px 12px;cursor:pointer;font-size:12px;font-weight:700;color:rgba(255,215,80,0.95);font-family:'Nunito',sans-serif;}
@keyframes xpf{0%{opacity:1;transform:translateY(0)}60%{opacity:1;transform:translateY(-36px)}100%{opacity:0;transform:translateY(-60px)}}
</style>
</head>
<body>
<div class="stars" id="stars"></div>
<div class="app">
  <div class="hdr">
    <div class="orb">🦋</div>
    <div class="hi"><div class="hs">🏛️ History · KS2 · Year 4</div><div class="ht">Ancient Egyptians</div></div>
    <div class="xpc">⭐ <span id="xpv">0</span></div>
  </div>
  <div class="mb"><div class="mf" id="mf"></div></div>
  <div class="pb" id="pb"></div>
  <div class="chat" id="chat"></div>
  <div class="ia">
    <div class="qrs" id="qrs"></div>
    <div class="ir">
      <textarea class="txta" id="inp" placeholder="Type anything — questions welcome!" rows="1"></textarea>
      <button class="sndb" id="sndb" onclick="send()">➤</button>
    </div>
    <div class="btmr">
      <button class="hntb" id="hntb" onclick="hint()">💡 Hint</button>
      <span class="stxt" id="stxt"></span>
    </div>
  </div>
</div>
<script>
const PROXY='/api/lumi';
const SYSTEM=`You are Lumi, Lyla Rae's personal AI learning companion. Lyla Rae is 8 years old, Year 4 KS2. Be warm, funny, enthusiastic. Make history feel like time travel. Never a teacher. CRITICAL: Always respond to what Lyla actually says first. Answer questions fully. Never skip past what she said. Short messages max 3 sentences then a question.

LESSON: ANCIENT EGYPTIANS
Phase signals END of message only:
[PHASE:explore] [PHASE:anchor] [PHASE:game] [PHASE:create] [PHASE:check] [PHASE:celebrate]
Content signals inline: [SHOW:pyramid] [SHOW:mummy] [SHOW:game] [SHOW:celebrate]

SPARK: Concept card visible. Put Lyla IN Egypt: Close your eyes Lyla. You are standing in a vast golden desert. In front of you are THREE MASSIVE stone triangles taller than 40 double-decker buses stacked up. The year is 2560 BC. You have just arrived in Ancient Egypt. What is the FIRST thing you want to know? When curious [PHASE:explore]
EXPLORE: Cover pyramids as tombs, mummification (70 days, brain through nose, heart stays), hieroglyphics, pharaohs. Answer ALL questions. When solid picture [PHASE:anchor]
ANCHOR: Pretend I am a 5 year old who never heard of Egypt. Who were they and what made them incredible? When solid [PHASE:game]
GAME: Lets play True or False then [SHOW:game]. After game result respond warmly then [PHASE:create]
CREATE: You are a time traveller in Ancient Egypt 4000 years ago! Write a diary entry — something you see, something that surprises you, how you feel. When done [PHASE:check]
CHECK: 3 casual questions about pyramids purpose, mummification length, and hieroglyphics. When done [PHASE:celebrate]
CELEBRATE: [SHOW:celebrate] with praise. Fun fact: Cleopatra was closer in time to us than to the pyramids.`;

const PHASES=['spark','explore','anchor','game','create','check','celebrate'];
const PICONS=['⚡','🔭','⚓','🎮','🎨','✅','🎉'];
const PLBLS=['Spark','Explore','Anchor','Game','Create','Check','Done!'];
const BNRS={explore:"⚡ Spark done! Let's explore 🔭",anchor:"🔭 Locking it in ⚓",game:"⚓ Game time 🎮",create:"🎮 Creative challenge 🎨",check:"🎨 Final check ✅",celebrate:"✅ All done! 🎉"};
const TOF=[
  {s:'The pyramids were built by slaves.',t:false,e:'Workers were actually PAID and got medical care — they were skilled craftsmen! 🏗️'},
  {s:'Egyptians invented paper from a plant called papyrus.',t:true,e:'TRUE! That is literally where the word paper comes from! 📜'},
  {s:'Cleopatra lived closer in time to us than to the pyramids.',t:true,e:'TRUE! Pyramids 2500 BC, Cleopatra 30 BC — 2470 years apart! We are only 2000 years from Cleopatra. 🤯'},
  {s:'Cats were sacred and worshipped in ancient Egypt.',t:true,e:'TRUE! Killing a cat — even by accident — was punishable by death! 😺'},
  {s:'The Great Sphinx was always the sandy colour it is today.',t:false,e:'It was originally painted in VIVID colours — bright reds, blues and yellows! 🦁'},
  {s:'Egyptians invented the 24-hour day we still use today.',t:true,e:'TRUE! Every time you check the time you are using 4000-year-old Egyptian maths! ⏰'},
];
let hist=[],phase=0,xp=0,mas=0,hints=0,busy=false,tofIdx=0,tofScore=0,tofDone=false;

(()=>{const el=document.getElementById('stars');for(let i=0;i<65;i++){const s=document.createElement('div');s.className='star';const z=Math.random()*2+1;s.style.cssText=`width:${z}px;height:${z}px;top:${Math.random()*100}%;left:${Math.random()*100}%;background:${Math.random()>.7?'#fbbf24':'white'};--d:${2+Math.random()*4}s;--delay:${Math.random()*4}s`;el.appendChild(s);}})();

function buildPB(){const el=document.getElementById('pb');PHASES.forEach((ph,i)=>{const d=document.createElement('div');d.className='pi';d.innerHTML=`<div class="pc ${i===0?'active':''}" id="pc${i}">${PICONS[i]}</div><div class="pl ${i===0?'active':''}" id="pl${i}">${PLBLS[i]}</div>`;el.appendChild(d);if(i<6){const l=document.createElement('div');l.className='pln';el.appendChild(l);}});}
function setP(p){phase=p;PHASES.forEach((_,i)=>{const c=document.getElementById('pc'+i),l=document.getElementById('pl'+i);c.className='pc'+(i<p?' done':i===p?' active':'');c.textContent=i<p?'✓':PICONS[i];l.className='pl'+(i===p?' active':'');});}
const ch=()=>document.getElementById('chat');
const sc=()=>setTimeout(()=>ch().scrollTo({top:ch().scrollHeight,behavior:'smooth'}),60);
function sT(){const e=document.createElement('div');e.className='tr';e.id='typ';e.innerHTML='<div class="la">🦋</div><div class="tb"><div class="td"></div><div class="td"></div><div class="td"></div></div>';ch().appendChild(e);sc();}
function hT(){const t=document.getElementById('typ');if(t)t.remove();}
function aL(h){hT();const e=document.createElement('div');e.className='lm';e.innerHTML=`<div class="la">🦋</div><div class="lb">${h}</div>`;ch().appendChild(e);sc();}
function aC(t){const e=document.createElement('div');e.className='cm';e.innerHTML=`<div class="cb">${t}</div>`;ch().appendChild(e);sc();}
function aBnr(t){const e=document.createElement('div');e.className='bnr';e.textContent=t;ch().appendChild(e);sc();}
function fmt(t){return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\*(.*?)\*/g,'<em>$1</em>').replace(/\n\n/g,'<br><br>').replace(/\n/g,'<br>');}
function aXp(n){xp+=n;document.getElementById('xpv').textContent=xp;const p=document.createElement('div');p.className='xpp';p.textContent=`+${n} XP ⭐`;p.style.animation='xpf 1.4s ease both';document.body.appendChild(p);setTimeout(()=>p.remove(),1400);}
function uM(d){mas=Math.min(100,Math.max(0,mas+d));document.getElementById('mf').style.width=mas+'%';}
function sQR(a){document.getElementById('qrs').innerHTML=a.map(r=>`<button class="qrb" onclick="uQR(this)">${r}</button>`).join('');}
function cQR(){document.getElementById('qrs').innerHTML='';}
function uQR(el){document.getElementById('inp').value=el.textContent;send();}
function addCC(){const e=document.createElement('div');e.className='cc';e.innerHTML='<div style="font-size:9px;font-weight:800;color:#f59e0b;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:5px">Today\'s adventure</div><div style="font-size:42px;float:right;margin:-4px -4px 0 10px">🏺</div><div style="font-family:Georgia,serif;font-size:22px;font-weight:900;color:#fff;margin-bottom:3px">Ancient Egyptians</div><div style="font-size:12px;color:#fcd34d;font-weight:700;margin-bottom:8px">One of the most extraordinary civilisations ever</div><div style="font-size:13px;color:#f5dfa0;line-height:1.6">For over 3000 years Ancient Egypt dominated the ancient world — with pyramids, mummies, and mysteries we are still uncovering today.</div>';ch().appendChild(e);sc();}
function bTOF(){
  const e=document.createElement('div');e.className='tof';e.id='tofc';
  e.innerHTML=`<div style="font-size:13px;font-weight:800;color:#fcd34d;margin-bottom:3px">⚡ True or False!</div><div style="font-size:11px;color:rgba(245,234,216,0.85);margin-bottom:12px">Some of these Egyptian facts are absolutely wild!</div><div class="tofq" id="tofq">${TOF[0].s}</div><div class="tofbtns"><button class="tofbtn" id="tbT" onclick="tofA(true)" style="background:rgba(16,185,129,0.1);border-color:rgba(16,185,129,0.3);color:#6ee7b7">✓ TRUE</button><button class="tofbtn" id="tbF" onclick="tofA(false)" style="background:rgba(239,68,68,0.1);border-color:rgba(239,68,68,0.3);color:#fca5a5">✗ FALSE</button></div><div class="trev" id="trev"></div><button class="tnxt" id="tnxt" onclick="tofN()">Next fact →</button><div style="text-align:center;font-size:11px;color:rgba(245,234,216,0.8);font-weight:700;margin-top:8px" id="tprog">Question 1 of ${TOF.length}</div>`;
  ch().appendChild(e);sc();document.getElementById('inp').disabled=true;document.getElementById('sndb').disabled=true;
}
function tofA(ans){const q=TOF[tofIdx];const ok=ans===q.t;document.getElementById('tbT').disabled=true;document.getElementById('tbF').disabled=true;const rv=document.getElementById('trev');if(ok){tofScore++;aXp(8);uM(8);rv.style.cssText='display:block;margin-top:10px;padding:11px 13px;border-radius:12px;font-size:13px;line-height:1.5;background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,0.25);color:#6ee7b7';rv.innerHTML='✓ Correct! '+q.e;}else{uM(-2);rv.style.cssText='display:block;margin-top:10px;padding:11px 13px;border-radius:12px;font-size:13px;line-height:1.5;background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.25);color:#fca5a5';rv.innerHTML='✗ Not quite! '+q.e;}document.getElementById('tnxt').style.display='block';sc();}
function tofN(){tofIdx++;if(tofIdx>=TOF.length){tofDone=true;document.getElementById('tofc').style.opacity='0.6';document.getElementById('inp').disabled=false;document.getElementById('sndb').disabled=false;setTimeout(()=>callLumi('[SYSTEM: Lyla completed True or False scoring '+tofScore+' out of '+TOF.length+'. Celebrate her score and mention 1-2 surprising facts, then continue.]',false),700);return;}document.getElementById('tofq').textContent=TOF[tofIdx].s;document.getElementById('trev').style.display='none';document.getElementById('tnxt').style.display='none';document.getElementById('tbT').disabled=false;document.getElementById('tbF').disabled=false;document.getElementById('tprog').textContent='Question '+(tofIdx+1)+' of '+TOF.length;sc();}
function sCel(){const ov=document.createElement('div');ov.className='cov';ov.innerHTML=`<div style="font-size:52px;margin-bottom:14px">🦋</div><div style="font-family:Georgia,serif;font-size:24px;font-weight:900;color:#fff;margin-bottom:6px;line-height:1.2">Lyla Rae, you were<br>absolutely amazing! ⭐</div><div style="font-size:13px;color:rgba(255,255,255,0.88);margin-bottom:18px">Ancient Egyptians · ${mas}% Mastery</div><div style="background:rgba(251,191,36,0.1);border:1px solid rgba(251,191,36,0.3);border-radius:14px;padding:14px 22px;margin-bottom:16px;display:inline-block"><div style="font-family:Georgia,serif;font-size:42px;font-weight:900;color:#fbbf24;line-height:1">+${xp} XP</div><div style="font-size:11px;color:rgba(255,255,255,0.8);font-weight:700;margin-top:4px">EARNED TODAY</div></div><div style="background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);border-radius:14px;padding:13px 16px;margin-bottom:16px;text-align:left;width:100%"><div style="font-size:10px;font-weight:800;color:#fbbf24;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:5px">💡 Mind-blowing fact!</div><div style="font-size:13px;color:rgba(255,255,255,0.95);line-height:1.6">Cleopatra lived closer in time to US than to when the pyramids were built — the pyramids were already ancient history to her! 🤯</div></div><div style="font-size:13px;color:rgba(255,255,255,0.85);margin-bottom:16px">Next up: <strong style="color:#fcd34d">The Tudors — including a king with SIX wives! 👑</strong></div><button onclick="this.closest('.cov').remove()" style="background:#f59e0b;border:none;border-radius:14px;padding:14px 32px;font-size:15px;font-weight:800;color:#100a00;cursor:pointer;width:100%;font-family:'Nunito',sans-serif">🎉 Amazing lesson, Lumi!</button>`;document.body.appendChild(ov);}
const QRP={
  spark:['How were they built?','Are there mummies?!','How old are they?','I am ready!'],
  explore:['Tell me more!','Why did they do that?','That is amazing!','Can I ask something?'],
  anchor:['So that means...','Can you explain that bit?','I think I get it now','Can you check my idea?'],
  game:['I think it is true','I think it is false','Give me another!','I want to try!'],
  create:['Here is my diary entry:','Can you help me start?','Can I make it more exciting?','What would Lyla see?'],
  check:['Test me!','I am ready for one more','Let me explain it back','Can you check me?'],
  done:['That was amazing!','Can we do another era?','What next?','I loved that!']
};
function sQR(a){document.getElementById('qrs').innerHTML=a.map(r=>`<button class="qrb" onclick="uQR(this)">${r}</button>`).join('');}
function cQR(){document.getElementById('qrs').innerHTML='';}
function uQR(el){document.getElementById('inp').value=el.textContent;send();}
function infQR(raw){
  const t=(raw||'').toLowerCase();
  if(t.includes('what do you think')||t.includes('ready to begin')||t.includes('imagine')||t.includes('first thing you want to know'))return ['How were they built?','Are there mummies?!','How old is this?','I am ready!'];
  if(t.includes('why')||t.includes('how')||t.includes('tell me more'))return ['Why did they do that?','Tell me more!','Can I ask something?','That is amazing!'];
  if(t.includes('your turn')||t.includes('true or false')||t.includes('have a go'))return ['I think it is true','I think it is false','Can I have a clue?','Let me try!'];
  if(t.includes('write')||t.includes('diary')||t.includes('create'))return ['Here is my diary entry:','Can you help me start?','What would Lyla see?','Can I make it better?'];
  if(t.includes('quiz')||t.includes('check')||t.includes('test'))return ['Test me!','I think I know it','One more question!','Can you check me?'];
  return null;
}
function rQR(raw=''){
  const phaseName=PHASES[phase]||'spark';
  sQR(infQR(raw)||QRP[phaseName]||QRP.spark);
}
async function callLumi(msg,showB=true){
  if(busy)return;busy=true;cQR();
  if(showB&&msg&&!msg.startsWith('[')){aC(msg);hist.push({role:'user',content:msg});aXp(3);uM(3);}
  else if(msg)hist.push({role:'user',content:msg});
